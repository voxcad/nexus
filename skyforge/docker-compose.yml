services:

  # PostgreSQL + PostGIS
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: skyforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (local job queue dev)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # FastAPI backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      SKYFORGE_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/skyforge
      SKYFORGE_GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      SKYFORGE_GCS_RAW_BUCKET: ${GCS_RAW_BUCKET:-skyforge-raw}
      SKYFORGE_GCS_OUTPUT_BUCKET: ${GCS_OUTPUT_BUCKET:-skyforge-output}
      SKYFORGE_PUBSUB_TOPIC: ${PUBSUB_TOPIC:-skyforge-jobs}
      SKYFORGE_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      SKYFORGE_GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SKYFORGE_STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      SKYFORGE_STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SKYFORGE_ENVIRONMENT: development
      SKYFORGE_WEB_URL: http://localhost:3000
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    volumes:
      - ~/.config/gcloud:/root/.config/gcloud:ro
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_FIREBASE_API_KEY: ${FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
    depends_on:
      - api

volumes:
  pgdata:
